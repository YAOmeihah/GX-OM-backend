name: Backend Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v1.2.3'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.version }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must look like v1.2.3, v1.2.3-rc.1, or v1.2.3+build.1" >&2
            exit 1
          fi

          version="${tag#v}"
          package="gx-om-backend-${tag}.tar.gz"
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "package=$package" >> "$GITHUB_OUTPUT"
          echo "build_time=$build_time" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        if: github.event_name == 'workflow_dispatch'
        run: git checkout ${{ steps.meta.outputs.tag }}

      - name: Resolve release commit
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Validate Composer files
        run: composer validate --strict

      - name: Install Composer production dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare release directory
        shell: bash
        run: |
          rm -rf build/release build/assets
          mkdir -p build/release build/assets

          php tools/prepare-backend-release.php \
            --source=. \
            --output=build/release

          php tools/generate-backend-release-manifest.php \
            --release-name="GX-OM Backend" \
            --version="${{ steps.meta.outputs.version }}" \
            --tag="${{ steps.meta.outputs.tag }}" \
            --commit="${{ steps.commit.outputs.sha }}" \
            --build-time="${{ steps.meta.outputs.build_time }}" \
            --output=build/release/release.json

      - name: Build release archive
        run: php tools/build-backend-release.php --source=build/release --output=build/assets/${{ steps.meta.outputs.package }}

      - name: Generate release manifest
        shell: bash
        run: |
          sha256="$(cut -d ' ' -f 1 build/assets/${{ steps.meta.outputs.package }}.sha256)"
          php tools/generate-backend-release-manifest.php \
            --release-name="GX-OM Backend" \
            --version="${{ steps.meta.outputs.version }}" \
            --tag="${{ steps.meta.outputs.tag }}" \
            --commit="${{ steps.commit.outputs.sha }}" \
            --build-time="${{ steps.meta.outputs.build_time }}" \
            --package-name="${{ steps.meta.outputs.package }}" \
            --sha256="$sha256" \
            --output=build/assets/release-manifest.json

      - name: Verify release package boundary
        shell: bash
        run: |
          tar -tzf build/assets/${{ steps.meta.outputs.package }} > build/assets/package-files.txt

          required_entries=(
            .env.example
            app/
            bootstrap/
            config/
            database/
            public/
            public/storage/
            public/build/
            resources/
            routes/
            vendor/
            artisan
            composer.lock
            release.json
            storage/app/maintenance_exports/
            storage/app/private/
            storage/app/public/
            storage/framework/cache/data/
            storage/framework/sessions/
            storage/framework/views/
            storage/logs/
          )

          blocked_entries=(
            .scribe/
            .editorconfig
            .env
            .env.testing
            .gitattributes
            .github/
            .gitignore
            API_DOCUMENTATION
            PERMISSION_SYSTEM
            auth.json
            composer.json
            create_test_data.php
            docs/
            generate_test_token.php
            node_modules/
            package-lock.json
            package.json
            phpstan.neon
            phpunit.xml
            postcss.config.js
            storage/app/maintenance_exports/old-export.json
            storage/framework/views/stale-view.php
            storage/logs/laravel.log
            tailwind.config.js
            test-permissions.php
            tests/
            tools/
            vite.config.js
          )

          contains_entry() {
            local entry="$1"
            if [[ "$entry" == */ ]]; then
              awk -v entry="$entry" 'index($0, entry) == 1 { found = 1 } END { exit found ? 0 : 1 }' build/assets/package-files.txt
            else
              awk -v entry="$entry" '$0 == entry { found = 1 } END { exit found ? 0 : 1 }' build/assets/package-files.txt
            fi
          }

          for entry in "${required_entries[@]}"; do
            contains_entry "$entry"
          done

          for entry in "${blocked_entries[@]}"; do
            ! contains_entry "$entry"
          done

          (
            cd build/assets
            sha256sum --check ${{ steps.meta.outputs.package }}.sha256
          )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: GX-OM Backend ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
          files: |
            build/assets/${{ steps.meta.outputs.package }}
            build/assets/${{ steps.meta.outputs.package }}.sha256
            build/assets/release-manifest.json
