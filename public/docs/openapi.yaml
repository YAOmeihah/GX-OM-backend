      description: 为客户进行一键清账操作，自动分配还款到未付账单，差额自动创建减免记录。
      parameters: []
      responses:
        200:
          description: 清账成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    payment:
                      id: 123
                      amount: '9500.00'
                      payment_number: PAY202601030001
                    allocations:
                      -
                        invoice_id: 1
                        amount: '3000.00'
                      -
                        invoice_id: 2
                        amount: '3000.00'
                      -
                        invoice_id: 3
                        amount: '3500.00'
                    discounts:
                      -
                        invoice_id: 3
                        amount: '500.00'
                    summary:
                      original_debt: '10000.00'
                      payment_received: '9500.00'
                      discount_applied: '500.00'
                      invoices_cleared: 3
                  message: 清账成功
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      payment:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 123
                          amount:
                            type: string
                            example: '9500.00'
                          payment_number:
                            type: string
                            example: PAY202601030001
                      allocations:
                        type: array
                        example:
                          -
                            invoice_id: 1
                            amount: '3000.00'
                          -
                            invoice_id: 2
                            amount: '3000.00'
                          -
                            invoice_id: 3
                            amount: '3500.00'
                        items:
                          type: object
                          properties:
                            invoice_id:
                              type: integer
                              example: 1
                            amount:
                              type: string
                              example: '3000.00'
                      discounts:
                        type: array
                        example:
                          -
                            invoice_id: 3
                            amount: '500.00'
                        items:
                          type: object
                          properties:
                            invoice_id:
                              type: integer
                              example: 3
                            amount:
                              type: string
                              example: '500.00'
                      summary:
                        type: object
                        properties:
                          original_debt:
                            type: string
                            example: '10000.00'
                          payment_received:
                            type: string
                            example: '9500.00'
                          discount_applied:
                            type: string
                            example: '500.00'
                          invoices_cleared:
                            type: integer
                            example: 3
                  message:
                    type: string
                    example: 清账成功
        422:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 无欠款
                    type: object
                    example:
                      success: false
                      message: 该客户在指定门店无待清账单
                    properties:
                      success:
                        type: boolean
                        example: false
                      message:
                        type: string
                        example: 该客户在指定门店无待清账单
                  -
                    description: 金额超出
                    type: object
                    example:
                      success: false
                      message: 收款金额超过总欠款
                    properties:
                      success:
                        type: boolean
                        example: false
                      message:
                        type: string
                        example: 收款金额超过总欠款
