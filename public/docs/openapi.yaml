openapi: 3.0.3
info:
  title: '债务管理系统 API 文档'
  description: '多门店债务管理系统 RESTful API，支持门店、客户、账单、还款、附件和审计日志管理。'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
paths:
  /api/login:
    post:
      summary: 用户登录
      operationId: ''
      description: "使用用户名/邮箱和密码登录系统，获取访问令牌。\n支持使用邮箱或用户名登录，系统会自动识别。"
      parameters: []
      responses:
        200:
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    user:
                      id: 1
                      name: 管理员
                      username: admin
                      email: admin@example.com
                      roles:
                        - admin
                      stores:
                        -
                          id: 1
                          name: 总店
                          code: MAIN
                          is_manager: true
                    token: 1|abcdefghijklmnopqrstuvwxyz123456
                  message: 登录成功
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 管理员
                          username:
                            type: string
                            example: admin
                          email:
                            type: string
                            example: admin@example.com
                          roles:
                            type: array
                            example:
                              - admin
                            items:
                              type: string
                          stores:
                            type: array
                            example:
                              -
                                id: 1
                                name: 总店
                                code: MAIN
                                is_manager: true
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                  example: 1
                                name:
                                  type: string
                                  example: 总店
                                code:
                                  type: string
                                  example: MAIN
                                is_manager:
                                  type: boolean
                                  example: true
                      token:
                        type: string
                        example: 1|abcdefghijklmnopqrstuvwxyz123456
                  message:
                    type: string
                    example: 登录成功
        422:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 用户名或密码错误
                    type: object
                    example:
                      message: 'The given data was invalid.'
                      errors:
                        login:
                          - 用户名/邮箱或密码错误
                    properties:
                      message:
                        type: string
                        example: 'The given data was invalid.'
                      errors:
                        type: object
                        properties:
                          login:
                            type: array
                            example:
                              - 用户名/邮箱或密码错误
                            items:
                              type: string
                  -
                    description: 参数验证失败
                    type: object
                    example:
                      message: 'The given data was invalid.'
                      errors:
                        login:
                          - 'login 字段是必需的'
                        password:
                          - 'password 字段是必需的'
                    properties:
                      message:
                        type: string
                        example: 'The given data was invalid.'
                      errors:
                        type: object
                        properties:
                          login:
                            type: array
                            example:
                              - 'login 字段是必需的'
                            items:
                              type: string
                          password:
                            type: array
                            example:
                              - 'password 字段是必需的'
                            items:
                              type: string
      tags:
        - 认证管理
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                  description: 用户名或邮箱地址
                  example: admin
                  nullable: false
                password:
                  type: string
                  description: 用户密码
                  example: password123
                  nullable: false
              required:
                - login
                - password
      security: []
  /api/register:
    post:
      summary: 用户注册
      operationId: ''
      description: "注册新用户账号，新用户默认获得店员(store_staff)角色。\n需要管理员权限才能注册新用户。"
      parameters: []
      responses:
        200:
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    user:
                      id: 2
                      name: 张三
                      username: zhangsan
                      email: zhangsan@example.com
                      roles:
                        - store_staff
                      stores: []
                    token: 2|abcdefghijklmnopqrstuvwxyz123456
                  message: 注册成功
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 2
                          name:
                            type: string
                            example: 张三
                          username:
                            type: string
                            example: zhangsan
                          email:
                            type: string
                            example: zhangsan@example.com
                          roles:
                            type: array
                            example:
                              - store_staff
                            items:
                              type: string
                          stores:
                            type: array
                            example: []
                      token:
                        type: string
                        example: 2|abcdefghijklmnopqrstuvwxyz123456
                  message:
                    type: string
                    example: 注册成功
        401:
          description: 未认证
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 未认证用户，请先登录
                  error_code: UNAUTHENTICATED
                  login_url: 'http://localhost/api/login'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 未认证用户，请先登录
                  error_code:
                    type: string
                    example: UNAUTHENTICATED
                  login_url:
                    type: string
                    example: 'http://localhost/api/login'
        422:
          description: 验证失败
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    username:
                      - 用户名已被使用
                    email:
                      - 邮箱已被注册
                    password:
                      - 密码长度不能少于6位
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      username:
                        type: array
                        example:
                          - 用户名已被使用
                        items:
                          type: string
                      email:
                        type: array
                        example:
                          - 邮箱已被注册
                        items:
                          type: string
                      password:
                        type: array
                        example:
                          - 密码长度不能少于6位
                        items:
                          type: string
      tags:
        - 认证管理
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 用户真实姓名，最大255字符
                  example: 张三
                  nullable: false
                username:
                  type: string
                  description: 登录用户名，最大255字符，必须唯一
                  example: zhangsan
                  nullable: false
                email:
                  type: string
                  description: 邮箱地址，必须唯一
                  example: zhangsan@example.com
                  nullable: false
                password:
                  type: string
                  description: 密码，最少6位
                  example: password123
                  nullable: false
                password_confirmation:
                  type: string
                  description: 确认密码，必须与password一致
                  example: password123
                  nullable: false
              required:
                - name
                - username
                - email
                - password
                - password_confirmation
  /api/logout:
    post:
      summary: 用户登出
      operationId: ''
      description: 销毁当前用户的访问令牌，使其失效。
      parameters: []
      responses:
        200:
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data: null
                  message: 登出成功
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: null
                  message:
                    type: string
                    example: 登出成功
        401:
          description: 未认证
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 未认证用户，请先登录
                  error_code: UNAUTHENTICATED
                  login_url: 'http://localhost/api/login'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 未认证用户，请先登录
                  error_code:
                    type: string
                    example: UNAUTHENTICATED
                  login_url:
                    type: string
                    example: 'http://localhost/api/login'
      tags:
        - 认证管理
  /api/user:
    get:
      summary: 获取当前用户信息
      operationId: ''
      description: 获取当前登录用户的详细信息，包括角色和门店权限。
      parameters: []
      responses:
        200:
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    name: 管理员
                    username: admin
                    email: admin@example.com
                    email_verified_at: '2024-01-01T00:00:00.000000Z'
                    created_at: '2024-01-01T00:00:00.000000Z'
                    updated_at: '2024-01-01T00:00:00.000000Z'
                    roles:
                      - admin
                    stores:
                      -
                        id: 1
                        name: 总店
                        code: MAIN
                        is_manager: true
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 管理员
                      username:
                        type: string
                        example: admin
                      email:
                        type: string
                        example: admin@example.com
                      email_verified_at:
                        type: string
                        example: '2024-01-01T00:00:00.000000Z'
                      created_at:
                        type: string
                        example: '2024-01-01T00:00:00.000000Z'
                      updated_at:
                        type: string
                        example: '2024-01-01T00:00:00.000000Z'
                      roles:
                        type: array
                        example:
                          - admin
                        items:
                          type: string
                      stores:
                        type: array
                        example:
                          -
                            id: 1
                            name: 总店
                            code: MAIN
                            is_manager: true
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            name:
                              type: string
                              example: 总店
                            code:
                              type: string
                              example: MAIN
                            is_manager:
                              type: boolean
                              example: true
        401:
          description: 未认证
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 未认证用户，请先登录
                  error_code: UNAUTHENTICATED
                  login_url: 'http://localhost/api/login'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 未认证用户，请先登录
                  error_code:
                    type: string
                    example: UNAUTHENTICATED
                  login_url:
                    type: string
                    example: 'http://localhost/api/login'
      tags:
        - 认证管理
  /api/user/password:
    put:
      summary: 修改密码
      operationId: ''
      description: 修改当前登录用户的密码。需要验证当前密码，新密码不能与当前密码相同。
      parameters: []
      responses:
        200:
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data: null
                  message: 密码修改成功
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: null
                  message:
                    type: string
                    example: 密码修改成功
        401:
          description: 未认证
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 未认证用户，请先登录
                  error_code: UNAUTHENTICATED
                  login_url: 'http://localhost/api/login'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 未认证用户，请先登录
                  error_code:
                    type: string
                    example: UNAUTHENTICATED
                  login_url:
                    type: string
                    example: 'http://localhost/api/login'
        422:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 当前密码错误
                    type: object
                    example:
                      message: 'The given data was invalid.'
                      errors:
                        current_password:
                          - 当前密码错误
                    properties:
                      message:
                        type: string
                        example: 'The given data was invalid.'
                      errors:
                        type: object
                        properties:
                          current_password:
                            type: array
                            example:
                              - 当前密码错误
                            items:
                              type: string
                  -
                    description: 新密码与当前密码相同
                    type: object
                    example:
                      message: 'The given data was invalid.'
                      errors:
                        new_password:
                          - 新密码不能与当前密码相同
                    properties:
                      message:
                        type: string
                        example: 'The given data was invalid.'
                      errors:
                        type: object
                        properties:
                          new_password:
                            type: array
                            example:
                              - 新密码不能与当前密码相同
                            items:
                              type: string
                  -
                    description: 新密码确认不一致
                    type: object
                    example:
                      message: 'The given data was invalid.'
                      errors:
                        new_password:
                          - 新密码与确认密码不一致
                    properties:
                      message:
                        type: string
                        example: 'The given data was invalid.'
                      errors:
                        type: object
                        properties:
                          new_password:
                            type: array
                            example:
                              - 新密码与确认密码不一致
                            items:
                              type: string
      tags:
        - 认证管理
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: 当前密码
                  example: oldpassword123
                  nullable: false
                new_password:
                  type: string
                  description: 新密码，最少6位
                  example: newpassword456
                  nullable: false
                new_password_confirmation:
                  type: string
                  description: 确认新密码
                  example: newpassword456
                  nullable: false
              required:
                - current_password
                - new_password
                - new_password_confirmation
  /api/dashboard/overview:
    get:
      summary: 获取仪表盘概览
      operationId: ''
      description: "获取系统概览数据，包括今日、昨日和总体统计。\n非管理员用户只能看到自己所属门店的数据统计。\n支持通过 store_id 参数筛选特定门店的数据。"
      parameters:
        -
          in: query
          name: store_id
          description: 可选，按门店ID筛选统计数据（用户需有该门店权限）
          example: 1
          required: false
          schema:
            type: integer
            description: 可选，按门店ID筛选统计数据（用户需有该门店权限）
            example: 1
            nullable: false
      responses:
        200:
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    summary:
                      total_customers: 100
                      total_invoices: 500
                      total_payments: 300
                      total_stores: 5
                    today:
                      invoice_amount: '10000.00'
                      invoice_count: 5
                      payment_amount: '8000.00'
                      payment_count: 3
                      discount_amount: '500.00'
                      new_customers: 2
                    yesterday:
                      invoice_amount: '9000.00'
                      invoice_count: 4
                      payment_amount: '6000.00'
                      payment_count: 2
                      discount_amount: '300.00'
                      new_customers: 1
                    overall:
                      invoice_amount: '500000.00'
                      paid_amount: '350000.00'
                      outstanding_amount: '145000.00'
                      discount_amount: '5000.00'
                      collection_rate: 70.0
                    invoice_status_distribution:
                      unpaid: 50
                      partially_paid: 100
                      paid: 300
                      overdue: 50
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      summary:
                        type: object
                        properties:
                          total_customers:
                            type: integer
                            example: 100
                          total_invoices:
                            type: integer
                            example: 500
                          total_payments:
                            type: integer
                            example: 300
                          total_stores:
                            type: integer
                            example: 5
                      today:
                        type: object
                        properties:
                          invoice_amount:
                            type: string
                            example: '10000.00'
                          invoice_count:
                            type: integer
                            example: 5
                          payment_amount:
                            type: string
                            example: '8000.00'
                          payment_count:
                            type: integer
                            example: 3
                          discount_amount:
                            type: string
                            example: '500.00'
                          new_customers:
                            type: integer
                            example: 2
                      yesterday:
                        type: object
                        properties:
                          invoice_amount:
                            type: string
                            example: '9000.00'
                          invoice_count:
                            type: integer
                            example: 4
                          payment_amount:
                            type: string
                            example: '6000.00'
                          payment_count:
                            type: integer
                            example: 2
                          discount_amount:
                            type: string
                            example: '300.00'
                          new_customers:
                            type: integer
                            example: 1
                      overall:
                        type: object
                        properties:
                          invoice_amount:
                            type: string
                            example: '500000.00'
                          paid_amount:
                            type: string
                            example: '350000.00'
                          outstanding_amount:
                            type: string
                            example: '145000.00'
                          discount_amount:
                            type: string
                            example: '5000.00'
                          collection_rate:
                            type: number
                            example: 70.0
                      invoice_status_distribution:
                        type: object
                        properties:
                          unpaid:
                            type: integer
                            example: 50
                          partially_paid:
                            type: integer
                            example: 100
                          paid:
                            type: integer
                            example: 300
                          overdue:
                            type: integer
                            example: 50
      tags:
        - 仪表盘
  /api/dashboard/statistics:
    get:
      summary: 获取详细统计数据
      operationId: ''
      description: "获取更详细的统计数据，支持按时间范围筛选。\n管理员可以看到各门店的分别统计。"
      parameters:
        -
          in: query
          name: start_date
          description: 开始日期(YYYY-MM-DD格式)
          example: '2024-01-01'
          required: false
          schema:
            type: string
            description: 开始日期(YYYY-MM-DD格式)
            example: '2024-01-01'
            nullable: false
        -
          in: query
          name: end_date
          description: 结束日期(YYYY-MM-DD格式)
          example: '2024-12-31'
          required: false
          schema:
            type: string
            description: 结束日期(YYYY-MM-DD格式)
            example: '2024-12-31'
            nullable: false
      responses:
        200:
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    period:
                      start_date: '2024-01-01'
                      end_date: '2024-12-31'
                    customers:
                      total_customers: 100
                      customers_with_debt: 30
                    invoices:
                      count: 500
                      total_amount: '500000.00'
                      paid_amount: '350000.00'
                      average_amount: '1000.00'
                    payments:
                      count: 300
                      total_amount: '350000.00'
                      average_amount: '1166.67'
                    stores:
                      -
                        store_id: 1
                        store_name: 总店
                        invoice_count: 200
                        total_amount: 200000
                        paid_amount: 150000
                      -
                        store_id: 2
                        store_name: 分店A
                        invoice_count: 150
                        total_amount: 150000
                        paid_amount: 100000
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      period:
                        type: object
                        properties:
                          start_date:
                            type: string
                            example: '2024-01-01'
                          end_date:
                            type: string
                            example: '2024-12-31'
                      customers:
                        type: object
                        properties:
                          total_customers:
                            type: integer
                            example: 100
                          customers_with_debt:
                            type: integer
                            example: 30
                      invoices:
                        type: object
                        properties:
                          count:
                            type: integer
                            example: 500
                          total_amount:
                            type: string
                            example: '500000.00'
                          paid_amount:
                            type: string
                            example: '350000.00'
                          average_amount:
                            type: string
                            example: '1000.00'
                      payments:
                        type: object
                        properties:
                          count:
                            type: integer
                            example: 300
                          total_amount:
                            type: string
                            example: '350000.00'
                          average_amount:
                            type: string
                            example: '1166.67'
                      stores:
                        type: array
                        example:
                          -
                            store_id: 1
                            store_name: 总店
                            invoice_count: 200
                            total_amount: 200000
                            paid_amount: 150000
                          -
                            store_id: 2
                            store_name: 分店A
                            invoice_count: 150
                            total_amount: 150000
                            paid_amount: 100000
                        items:
                          type: object
                          properties:
                            store_id:
                              type: integer
                              example: 1
                            store_name:
                              type: string
                              example: 总店
                            invoice_count:
                              type: integer
                              example: 200
                            total_amount:
                              type: integer
                              example: 200000
                            paid_amount:
                              type: integer
                              example: 150000
        401:
          description: 未认证
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 未认证用户，请先登录
                  error_code: UNAUTHENTICATED
                  login_url: 'http://localhost/api/login'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 未认证用户，请先登录
                  error_code:
                    type: string
                    example: UNAUTHENTICATED
                  login_url:
