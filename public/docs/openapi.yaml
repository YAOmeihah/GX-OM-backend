                  nullable: true
                apply_discount:
                  type: boolean
                  description: 差额是否作为减免，默认true
                  example: true
                  nullable: true
                expected_debt:
                  type: number
                  description: ''
                  example: 1.82
                  nullable: true
              required:
                - payment_amount
