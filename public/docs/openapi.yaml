  /api/permissions:
    get:
      summary: 获取所有权限（按模块分组）
      operationId: ''
      description: "获取系统中所有31个权限点，按模块分组返回。\n用于权限管理页面展示和角色权限分配。\n\n**权限模块**:\n- invoices: 账单管理 (4个权限)\n- payments: 还款管理 (6个权限)\n- customers: 客户管理 (4个权限)\n- stores: 门店管理 (4个权限)\n- users: 用户管理 (6个权限)\n- dashboard: 仪表盘 (1个权限)\n- reports: 报表管理 (2个权限)\n- audit-logs: 审计日志 (1个权限)\n- roles: 角色管理 (2个权限)\n- settings: 系统设置 (1个权限)"
      parameters: []
      responses:
        200:
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    invoices:
                      -
                        id: 1
                        name: 查看账单
                        slug: invoices.view
                        module: invoices
                        description: 查看账单列表和详情
                      -
                        id: 2
                        name: 创建账单
                        slug: invoices.create
                        module: invoices
                        description: 创建新账单
                      -
                        id: 3
                        name: 编辑账单
                        slug: invoices.update
                        module: invoices
                        description: 编辑账单信息
                      -
                        id: 4
                        name: 删除账单
                        slug: invoices.delete
                        module: invoices
                        description: 删除账单
                    payments:
                      -
                        id: 5
                        name: 查看还款
                        slug: payments.view
                        module: payments
                        description: 查看还款记录
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      invoices:
                        type: array
                        example:
